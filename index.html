<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>那智勝浦デジタルスタンプラリー</title>
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe2;         /* 和紙 */
    --paper-deep: #ece4d1;
    --ink: #2b2620;           /* 墨 */
    --ink-soft: #6b6255;
    --forest: #1f3b2c;        /* 那智の杉・古道の森 */
    --forest-deep: #142a1e;
    --vermillion: #a8341f;    /* 朱印・鳥居 */
    --vermillion-deep: #7c2416;
    --gold: #b08d3f;          /* 社殿の金具 */
    --line-faint: #cdbfa0;
  }

  * { box-sizing: border-box; }

  body {
    font-family: "M PLUS Rounded 1c", sans-serif;
    background: var(--paper);
    background-image:
      radial-gradient(rgba(0,0,0,0.015) 1px, transparent 1px),
      radial-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 2px 3px;
    margin: 0;
    padding: 0 0 32px;
    color: var(--ink);
  }

  .top-banner {
    position: relative;
    height: 132px;
    background: linear-gradient(160deg, var(--forest) 0%, var(--forest-deep) 100%);
    /* 写真を使う場合は下の .top-banner.has-photo が背景画像を上書きします */
    overflow: hidden;
  }
  .top-banner svg { position:absolute; bottom:-2px; left:0; width:100%; height:auto; opacity:0.5; }
  .top-banner .crest {
    position: absolute; top: 14px; right: 18px; width: 34px; height: 34px; opacity: 0.85;
  }
  /* 写真を差し込みたい場合：style="background-image:url('写真URL')" を
     この top-banner 要素に直接指定してください（下部にJSでの設定例あり） */

  .header-text {
    position: absolute; left: 20px; bottom: 14px; color: #f4efe2;
  }
  .header-eyebrow {
    font-size: 11px; letter-spacing: 0.14em; color: #d8c98f; margin-bottom: 4px;
  }
  .header-title {
    font-family: "Mochiy Pop One", sans-serif; font-weight: 400; font-size: 21px; letter-spacing: 0.02em;
  }

  .card {
    background: var(--paper);
    border-top: 3px solid var(--gold);
    padding: 22px 20px 26px;
    max-width: 480px;
    margin: 0 auto;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  }

  .status { font-size: 14.5px; line-height: 1.7; margin: 4px 0 18px; color: var(--ink-soft); }
  .status.loading { color: var(--ink-soft); }
  .status.error { color: var(--vermillion-deep); font-weight: 500; }

  .divider {
    display: flex; align-items: center; gap: 8px; margin: 0 0 16px; color: var(--gold);
  }
  .divider::before, .divider::after {
    content: ""; flex: 1; height: 1px; background: var(--line-faint);
  }
  .divider svg { width: 16px; height: 16px; flex-shrink: 0; }

  .progress { display: flex; flex-direction: column; margin: 0 0 20px; }
  .spot-row {
    display: flex; align-items: center; gap: 12px; padding: 12px 2px;
    border-bottom: 1px dashed var(--line-faint);
  }
  .spot-row:first-child { border-top: 1px dashed var(--line-faint); }

  /* ---- 朱印風スタンプ ---- */
  .badge {
    width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: "M PLUS Rounded 1c", sans-serif; font-size: 13px; font-weight: 700;
    border: 1.5px dashed #b7ab8f; color: transparent;
  }
  .badge.done {
    border: 2px solid var(--vermillion);
    box-shadow: inset 0 0 0 2px var(--paper), inset 0 0 0 3px var(--vermillion);
    color: var(--vermillion);
    background: rgba(168,52,31,0.06);
    transform: rotate(-7deg);
    font-weight: 700;
  }

  .spot-name { font-size: 14.5px; flex: 1; }
  .spot-row.done .spot-name { color: var(--ink); font-weight: 500; }

  .map-link {
    font-size: 11px; color: var(--forest); text-decoration: none; white-space: nowrap;
    padding: 5px 9px; border: 1px solid var(--forest); flex-shrink: 0;
    font-family: "M PLUS Rounded 1c", sans-serif; font-weight: 700;
  }
  .map-link:active { background: var(--forest); color: #fff; }

  /* ---- ボタン：木札風の角欠け ---- */
  .btn {
    display: block; width: 100%; margin-top: 14px; padding: 15px 18px;
    background: var(--forest); color: #f4efe2; text-align: center;
    font-family: "Mochiy Pop One", sans-serif; font-weight: 400; font-size: 15px;
    letter-spacing: 0.02em; border: none; cursor: pointer;
    clip-path: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
  }
  .btn:active { background: var(--forest-deep); }
  .btn:disabled { background: #b9b2a2; }
  .btn.secondary {
    background: transparent; color: var(--vermillion); border: 1.5px solid var(--vermillion);
    box-shadow: none;
  }
  .btn.secondary:active { background: rgba(168,52,31,0.08); }

  .note { font-size: 11.5px; color: var(--ink-soft); margin-top: 18px; line-height: 1.6; }

  .ranking-panel { margin-top: 18px; padding-top: 16px; border-top: 1px dashed var(--line-faint); display: none; }
  .ranking-title {
    font-family: "Mochiy Pop One", sans-serif; font-weight: 400; font-size: 15px; margin-bottom: 10px; color: var(--forest);
  }
  .ranking-row {
    display: flex; align-items: center; gap: 10px; padding: 7px 2px; font-size: 13.5px;
    border-bottom: 1px dotted var(--line-faint);
  }
  .ranking-row .rank {
    width: 26px; height: 26px; flex-shrink: 0; display:flex; align-items:center; justify-content:center;
    font-family: "M PLUS Rounded 1c", sans-serif; font-weight: 800; font-size: 12px;
    background: var(--forest); color: #f4efe2;
  }
  .ranking-row.me { background: rgba(168,52,31,0.08); }
  .my-rank-summary {
    font-size: 12.5px; color: var(--ink-soft); margin-top: 12px; padding-top: 12px;
    border-top: 1px dashed var(--line-faint);
  }
</style>
</head>
<body>
  <div class="top-banner" id="topBanner">
    <!-- 写真を使う場合、JS側の HEADER_PHOTO_URL に画像URLを入れると自動で背景に反映されます -->
    <svg viewBox="0 0 400 60" preserveAspectRatio="none"><path d="M0,60 L0,38 Q60,10 120,34 T240,30 T400,20 L400,60 Z" fill="#0f2016"/></svg>
    <svg class="crest" viewBox="0 0 64 64"><circle cx="32" cy="32" r="30" fill="none" stroke="#d8c98f" stroke-width="1.5"/><path d="M32 16 L38 30 L32 26 L26 30 Z M20 34 Q26 44 32 34 M44 34 Q38 44 32 34" fill="none" stroke="#d8c98f" stroke-width="1.4" stroke-linejoin="round"/></svg>
    <div class="header-text">
      <div class="header-eyebrow">熊野・那智勝浦</div>
      <div class="header-title">デジタルスタンプラリー</div>
    </div>
  </div>

  <div class="card">
    <div id="message" class="status loading">読み込み中...</div>

    <div class="divider"><svg viewBox="0 0 24 24"><path d="M12 3 L15 10 L12 8 L9 10 Z M4 13 Q9 21 12 13 M20 13 Q15 21 12 13" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg></div>

    <div id="progress" class="progress"></div>
    <button id="checkBtn" class="btn" style="display:none;">今いる場所でスタンプをチェック</button>
    <button id="rankingBtn" class="btn secondary" style="display:none;">ランキングを見る</button>
    <div id="rankingPanel" class="ranking-panel">
      <div class="ranking-title">スタンプ獲得数ランキング（上位10名）</div>
      <div id="rankingList"></div>
      <div id="myRankSummary" class="my-rank-summary"></div>
    </div>
    <div class="note">スポットの近く（目安100m以内）でボタンを押してください。GPSの精度により反応しない場合は、電波の良い屋外で再度お試しください。</div>
  </div>

<script>
// ====== 設定（要変更） ======
const LIFF_ID = "2010592172-A7pqW4nV"; // LINE Developersで発行したLIFF ID
const GAS_ENDPOINT = "https://script.google.com/macros/s/AKfycbzYjUUKJ0K6jg2FjkXK9WtztG9LJefLOttht4itRD2wleesT7XJtCjVeVWq-VczJVXxDw/exec"; // デプロイ済みのWebアプリURL

// ヘッダーに写真を使いたい場合は、ここに画像URL（nachikan.jpのメディアURL等）を入れてください。
// 空文字のままなら、下の和柄グラデーション（フォールバック）が表示されます。
const HEADER_PHOTO_URL = ""; // 例: "https://nachikan.jp/wp-content/uploads/2021/01/xxxx.jpg"
// ============================
// リッチメニューやトーク画面から共通のこの1ページを開くだけでOK。
// スポットIDはURLパラメータで受け取らず、GAS側が現在地から自動判定する。

if (HEADER_PHOTO_URL) {
  const banner = document.getElementById("topBanner");
  banner.style.backgroundImage =
    `linear-gradient(180deg, rgba(20,42,30,0.15) 0%, rgba(15,32,22,0.75) 100%), url('${HEADER_PHOTO_URL}')`;
  banner.style.backgroundSize = "cover";
  banner.style.backgroundPosition = "center";
}

const messageEl = document.getElementById("message");
const progressEl = document.getElementById("progress");
const checkBtn = document.getElementById("checkBtn");
const rankingBtn = document.getElementById("rankingBtn");
const rankingPanel = document.getElementById("rankingPanel");
const rankingList = document.getElementById("rankingList");
const myRankSummary = document.getElementById("myRankSummary");

let currentUserId = null;
let currentDisplayName = null;

async function main() {
  await liff.init({ liffId: LIFF_ID });
  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }
  const profile = await liff.getProfile();
  currentUserId = profile.userId;
  currentDisplayName = profile.displayName;

  await refreshProgress(currentUserId);
  checkBtn.style.display = "block";
  checkBtn.onclick = getStamp;
  rankingBtn.style.display = "block";
  rankingBtn.onclick = toggleRanking;
}

async function refreshProgress(userId) {
  const res = await fetch(`${GAS_ENDPOINT}?action=progress&userId=${userId}`);
  const data = await res.json();
  renderProgress(data);
}

function renderProgress(data) {
  progressEl.innerHTML = "";
  data.spots.forEach(s => {
    const row = document.createElement("div");
    row.className = "spot-row" + (s.collected ? " done" : "");
    const badge = document.createElement("div");
    badge.className = "badge" + (s.collected ? " done" : "");
    badge.textContent = s.collected ? "✓" : "・";
    const name = document.createElement("div");
    name.className = "spot-name";
    name.textContent = s.spotName;
    row.appendChild(badge);
    row.appendChild(name);

    // Googleマップへのリンク（緯度経度がある場合のみ表示）
    if (s.lat && s.lng) {
      const mapLink = document.createElement("a");
      mapLink.className = "map-link";
      mapLink.textContent = "📍地図";
      mapLink.href = "#";
      mapLink.onclick = (ev) => {
        ev.preventDefault();
        const mapUrl = `https://www.google.com/maps?q=${s.lat},${s.lng}`;
        // LIFF内なので外部ブラウザで開く
        if (window.liff && liff.isInClient && liff.isInClient()) {
          liff.openWindow({ url: mapUrl, external: true });
        } else {
          window.open(mapUrl, "_blank");
        }
      };
      row.appendChild(mapLink);
    }

    progressEl.appendChild(row);
  });
  messageEl.textContent = `${data.collectedCount} / ${data.totalCount} スポット達成`;
  messageEl.className = "status";
}

function getStamp() {
  checkBtn.disabled = true;
  messageEl.textContent = "GPSで現在地を確認しています…（電波状況により20〜30秒程度かかる場合があります）";
  messageEl.className = "status loading";

  navigator.geolocation.getCurrentPosition(async (pos) => {
    const { latitude, longitude } = pos.coords;
    try {
      const res = await fetch(GAS_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "text/plain" }, // GAS側の制約回避のためtext/plainで送信
        body: JSON.stringify({ userId: currentUserId, lat: latitude, lng: longitude, displayName: currentDisplayName })
      });
      const data = await res.json();

      if (data.newlyCollected && data.newlyCollected.length > 0) {
        const names = data.newlyCollected.map(s => s.spotName).join("、");
        messageEl.textContent = `「${names}」のスタンプを獲得しました！`;
        messageEl.className = "status";
      } else if (data.alreadyHere) {
        messageEl.textContent = "このスポットは既に獲得済みです。";
        messageEl.className = "status";
      } else {
        messageEl.textContent = "近くにスタンプスポットが見つかりませんでした。スポットにもう少し近づいてから再度お試しください。";
        messageEl.className = "status error";
      }

      renderProgress(data.progress);

      if (data.completed) {
        messageEl.textContent += " 🎉 全スポット達成！LINEにお知らせを送りました。";
      }
    } catch (err) {
      messageEl.textContent = "通信エラーが発生しました。電波の良い場所で再度お試しください。";
      messageEl.className = "status error";
    }
    checkBtn.disabled = false;
  }, () => {
    messageEl.textContent = "位置情報の取得が許可されていません。設定から位置情報を許可してください。";
    messageEl.className = "status error";
    checkBtn.disabled = false;
  }, { enableHighAccuracy: true, timeout: 10000 });
}

main();

// ---------- ランキング ----------

let rankingVisible = false;

async function toggleRanking() {
  rankingVisible = !rankingVisible;
  if (!rankingVisible) {
    rankingPanel.style.display = "none";
    rankingBtn.textContent = "ランキングを見る";
    return;
  }
  rankingBtn.textContent = "ランキングを閉じる";
  rankingPanel.style.display = "block";
  rankingList.innerHTML = "読み込み中…";
  myRankSummary.textContent = "";

  try {
    const res = await fetch(`${GAS_ENDPOINT}?action=ranking&userId=${currentUserId}`);
    const data = await res.json();
    renderRanking(data);
  } catch (err) {
    rankingList.innerHTML = "ランキングの取得に失敗しました。";
  }
}

function renderRanking(data) {
  rankingList.innerHTML = "";
  if (!data.top10 || data.top10.length === 0) {
    rankingList.textContent = "まだランキングデータがありません。";
  } else {
    data.top10.forEach(entry => {
      const row = document.createElement("div");
      row.className = "ranking-row";
      row.innerHTML = `<div class="rank">${entry.rank}位</div><div>${entry.name}</div><div style="margin-left:auto;">${entry.count}個</div>`;
      rankingList.appendChild(row);
    });
  }

  if (data.myRank) {
    myRankSummary.textContent = `あなたは現在 ${data.myRank}位 / 参加者${data.totalParticipants}人中（獲得数：${data.myCount}個）`;
  } else {
    myRankSummary.textContent = "まだスタンプを1つも獲得していません。スポットを回ってランキングに参加しましょう！";
  }
}

</script>
</body>
</html>
